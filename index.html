      margin-bottom: 30px; /* Pushes it away from the bottom edge */

    /* This creates the "Ruler" look with multiple tick marks */
    .leaflet-control-scale-line {
      background: linear-gradient(90deg,

        transparent 49%, #ffffff 50%, transparent 50%, 
        transparent 74%, #ffffff 75%, transparent 75%, 
        transparent 99%, #ffffff 100%) !important;
      background-size: 100% 5px !important; /* Ticks are 5px tall */
      background-repeat: no-repeat !important;
      background-position: bottom !important;
      border: 2px solid #ffffff !important;
      border-top: none !important;
      padding-bottom: 5px !important;
      margin-left: 30px !important; /* Your spacing */
      font-weight: bold;
      text-align: center;
    }

    /* Styles the imperial (miles) part if stacked */
    .leaflet-control-scale-line:not(:first-child) {
      border-bottom: none !important;
      border-top: 2px solid #ffffff !important;
      background-position: top !important;
    }

.leaflet-control-scale-line {
      text-shadow: none !important;
      -webkit-text-stroke: 0;
}
    /* The Legend Box */
    .legend {
      padding: 10px;
      font-family: Arial, sans-serif;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      border-radius: 5px;
      line-height: 24px;
      color: #333;
    }
    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
      border: 1px solid #999;
    }
  </style>

    }).addTo(map);

 // scale bar

    // --- STEP C: THE GHOST HIGHLIGHT LAYER ---
    var highlightLayer = L.geoJSON(null, {
      style: {
        color: "#ffffff",
        weight: 3,
        fillOpacity: 0.3,
        fillColor: "#ffffff",
        interactive: false 
      }
    }).addTo(map);

    // --- STEP D: THE REUSABLE LOGIC FUNCTION ---
    function addMyLayer(data, baseColor) {
      return L.geoJSON(data, {
        style: function(feature) {
          return {
            color: baseColor,
            fillColor: baseColor,
            fillOpacity: 0.5,
            weight: 2
          };
        },
        onEachFeature: function(feature, layer) {
          var name = feature.properties.Name || feature.properties.name || "Unnamed Area";
          layer.bindPopup("<strong>" + name + "</strong>");

          layer.on({
            mouseover: function(e) {
              e.target.setStyle({ fillOpacity: 0.6, weight: 3, color: "#ffcc00" });
            },
            mouseout: function(e) {
              e.target.setStyle({ color: baseColor, fillColor: baseColor, fillOpacity: 0.3, weight: 2 });
            },
            click: function(e) {
              highlightLayer.clearLayers();
              highlightLayer.addData(feature);
              highlightLayer.bringToFront();
              
              var center = layer.getBounds().getCenter();
              layer.openPopup(center);

              setTimeout(function() { layer.bringToBack(); }, 10);
              L.DomEvent.stopPropagation(e);
            }
          });
        }
      }).addTo(map);
    }

    // --- STEP E: ACTIVATE THE LAYERS ---
    var lakes = addMyLayer(geojsonData2, "#eb8f34"); // orange
    var parks = addMyLayer(geojsonData, "#3498db");  // blue


    // --- STEP F: INTERACTION (Cmd/Ctrl Required) ---
    map.dragging.disable();
    
    var warningDiv = document.createElement('div');
    warningDiv.style.cssText = 'position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 20px; border-radius: 5px; font-family: sans-serif; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.3s;';
    warningDiv.innerHTML = 'Hold <b>Cmd</b> or <b>Ctrl</b> to move the map';
    document.getElementById('map').appendChild(warningDiv);

    var warningTimeout;
    var isMouseDown = false;

    map.on('mousedown', function() { isMouseDown = true; });
    map.on('mouseup mouseout', function() { isMouseDown = false; });

    map.on('mousemove', function() {
      if (isMouseDown && !map.dragging.enabled()) {
        warningDiv.style.opacity = '1';
        clearTimeout(warningTimeout);
        warningTimeout = setTimeout(function() { warningDiv.style.opacity = '0'; }, 1000);
      }
    });

    window.addEventListener('keydown', function(e) {
      if (e.key === 'Control' || e.key === 'Meta') {
        map.dragging.enable();
        warningDiv.style.opacity = '0';
      }
    });

    window.addEventListener('keyup', function(e) {
      if (e.key === 'Control' || e.key === 'Meta') {
        map.dragging.disable();
      }
    });

    map.on('click', function() {
      highlightLayer.clearLayers();
    });

  var legend = L.control({position: 'topleft'});

  legend.onAdd = function (map) {
    var div = L.DomUtil.create('div', 'info legend');
    var labels = ['<strong>Map Key</strong>'];
    var categories = [
      { name: 'Reciever coverage', color: '#eb8f34' },
      { name: 'Protected areas',  color: '#3498db' }
    ];

    for (var i = 0; i < categories.length; i++) {
      div.innerHTML += 
        labels.push(
          '<i style="background:' + categories[i].color + '"></i> ' +
          categories[i].name
        );
    }
    div.innerHTML = labels.join('<br>');
    return div;
  };

  legend.addTo(map);
